name: "Lint PR Title"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

jobs:
  main:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Lista dei prefissi accettati
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
          # Richiede che ci sia almeno un tipo valido
          requireScope: false